name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: lelandsequel/luna
          path: _deps/luna
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: lelandsequel/strata-v1
          path: _deps/strata-v1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Link sibling engines for file: deps
        run: |
          ln -sf "$GITHUB_WORKSPACE/_deps/luna" "$GITHUB_WORKSPACE/../luna"
          ln -sf "$GITHUB_WORKSPACE/_deps/strata-v1" "$GITHUB_WORKSPACE/../strata-v1"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run seed
      - run: npm test
      - run: npm run build