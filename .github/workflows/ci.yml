name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Clone sibling engines
        run: |
          git clone --depth 1 https://github.com/lelandsequel/luna.git "${GITHUB_WORKSPACE}/../luna"
          git clone --depth 1 https://github.com/lelandsequel/strata-v1.git "${GITHUB_WORKSPACE}/../strata-v1"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run seed
      - run: npm test
      - run: npm run build